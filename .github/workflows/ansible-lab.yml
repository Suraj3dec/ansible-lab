name: "AWS Ansible Lab Manager"

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose whether to Create (apply) or Terminate (destroy) your lab'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

permissions:
  contents: read

jobs:
  manage_lab:
    name: "Orchestrate AWS Lab"
    runs-on: ubuntu-latest
    
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # Set your preferred default AWS Region

      - name: "3. Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: "4. Terraform Init"
        run: terraform init
        working-directory: ./terraform

      # ==========================================
      # 🛑 DESTROY FLOW
      # ==========================================
      - name: "Terraform Destroy (Shutdown Lab)"
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve
        working-directory: ./terraform

      # ==========================================
      # 🚀 APPLY FLOW
      # ==========================================
      - name: "Terraform Apply (Provision Lab)"
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve
        working-directory: ./terraform

      - name: "Install Ansible"
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: "Run Ansible Configuration Playbook"
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          echo "[INFO] Giving instances 30 seconds to fully boot and start SSH daemon..."
          sleep 30
          
          # Set safe permissions on the private key generated by Terraform
          chmod 600 ./terraform/id_rsa
          
          # Execute the playbook
          ansible-playbook -i ./terraform/inventory.ini ./ansible/site.yml --private-key ./terraform/id_rsa
        working-directory: .
